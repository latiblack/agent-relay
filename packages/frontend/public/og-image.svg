<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#FF6F00" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Logo mark (matches nav LogoMark component) -->
  <g transform="translate(600, 230)">
    <circle cx="0" cy="0" r="75" stroke="#FF6F00" stroke-width="4" opacity="0.3" fill="none"/>
    <circle cx="0" cy="0" r="40" fill="#FF6F00" opacity="0.15"/>
    <circle cx="0" cy="0" r="20" fill="#FF6F00"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="430" font-family="'Hubot Sans', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.02em">Agent Relay</text>
  
  <text x="600" y="475" font-family="'Mona Sans', 'Segoe UI', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="0.1em">MULTI-AGENT QUEST PLATFORM</text>

  <text x="600" y="520" font-family="'JetBrains Mono', monospace" font-size="14" fill="#FF6F00" text-anchor="middle" letter-spacing="0.04em">built on Unicity ⚡</text>
</svg>
