<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E05A00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#FF6F00" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Relay network nodes -->
  <circle cx="300" cy="250" r="45" fill="url(#accent)" opacity="0.15"/>
  <circle cx="300" cy="250" r="18" fill="url(#accent)"/>
  <circle cx="300" cy="250" r="7" fill="#fff" opacity="0.3"/>
  
  <circle cx="500" cy="180" r="35" fill="url(#accent)" opacity="0.1"/>
  <circle cx="500" cy="180" r="14" fill="url(#accent)"/>
  
  <circle cx="700" cy="250" r="35" fill="url(#accent)" opacity="0.1"/>
  <circle cx="700" cy="250" r="14" fill="url(#accent)"/>

  <circle cx="500" cy="350" r="35" fill="url(#accent)" opacity="0.1"/>
  <circle cx="500" cy="350" r="14" fill="url(#accent)"/>

  <!-- Connection lines -->
  <g stroke="#FF6F00" stroke-width="2" opacity="0.15">
    <line x1="315" y1="240" x2="488" y2="190"/>
    <line x1="315" y1="260" x2="488" y2="340"/>
    <line x1="510" y1="192" x2="688" y2="244"/>
    <line x1="510" y1="340" x2="688" y2="256"/>
  </g>

  <!-- Animated dashed paths -->
  <g stroke="#FF6F00" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,8">
    <line x1="318" y1="248" x2="494" y2="248"/>
  </g>
  
  <!-- Text -->
  <text x="595" y="440" font-family="'Hubot Sans', 'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.02em">Agent Relay</text>
  
  <text x="595" y="485" font-family="'Mona Sans', 'Segoe UI', Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="0.08em">MULTI-AGENT QUEST PLATFORM</text>

  <text x="595" y="530" font-family="'JetBrains Mono', monospace" font-size="14" fill="#FF6F00" text-anchor="middle" letter-spacing="0.04em">built on Unicity ⚡</text>
</svg>
