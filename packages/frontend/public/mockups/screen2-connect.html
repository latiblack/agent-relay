<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen 2 - Connect Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/hubot-sans">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #f1f5f9; font-family: 'Mona Sans', sans-serif; width: 390px; height: 844px; overflow: hidden; display: flex; flex-direction: column; }
.header { display: flex; align-items: center; gap: 12px; padding: 20px 20px 0; }
.back-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,111,0,0.08); border: 1px solid rgba(255,111,0,0.12); color: #f1f5f9; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; }
.logo-big { width: 72px; height: 72px; margin-bottom: 24px; }
h1 { font-family: 'Hubot Sans', sans-serif; font-size: 26px; font-weight: 600; margin-bottom: 10px; }
p { color: rgba(241,245,249,0.45); font-size: 14px; line-height: 1.6; max-width: 320px; margin-bottom: 36px; }
.wallet-option { width: 100%; max-width: 340px; display: flex; align-items: center; gap: 16px; padding: 18px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
.wallet-option:hover { background: rgba(255,111,0,0.06); border-color: rgba(255,111,0,0.2); }
.wallet-option .icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #FF6F00, #E05A00); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.wallet-option .info { text-align: left; flex: 1; }
.wallet-option .info .name { font-size: 15px; font-weight: 600; }
.wallet-option .info .desc { font-size: 11px; color: rgba(241,245,249,0.35); margin-top: 2px; }
.wallet-option .arrow { color: rgba(241,245,249,0.2); font-size: 18px; }
.network-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(255,111,0,0.06); border: 1px solid rgba(255,111,0,0.1); border-radius: 9999px; font-size: 11px; color: #FF6F00; font-family: 'JetBrains Mono', monospace; margin-bottom: 32px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: inline-block; }
.features { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.feature-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: rgba(241,245,249,0.35); }
.feature-row svg { width: 14px; height: 14px; stroke: #22c55e; fill: none; flex-shrink: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="back-btn">←</div>
</div>
<div class="content">
  <svg class="logo-big" viewBox="0 0 32 32">
    <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
    <circle cx="16" cy="16" r="14" stroke="#FF6F00" stroke-width="1.5" opacity="0.3" fill="none"/>
    <circle cx="16" cy="16" r="8" fill="#FF6F00" opacity="0.15"/>
    <circle cx="16" cy="16" r="4" fill="#FF6F00"/>
  </svg>
  <h1>Connect Your Wallet</h1>
  <p>Link your Sphere wallet to create a passport and deploy agents on the Unicity network.</p>
  <div class="network-badge">
    <span class="dot"></span>
    Unicity Testnet2 · Chain ID 4
  </div>
  <div class="wallet-option">
    <div class="icon">◈</div>
    <div class="info">
      <div class="name">Sphere Wallet</div>
      <div class="desc">Connect via Sphere SDK</div>
    </div>
    <div class="arrow">→</div>
  </div>
  <div class="features">
    <div class="feature-row">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      Identity handshake via Nostr DMs
    </div>
    <div class="feature-row">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      Permissioned relay key generation
    </div>
    <div class="feature-row">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      Multi-agent quest activation
    </div>
  </div>
</div>
</body>
</html>
